<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#c0785a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="./manifest.json">
<title>日本語 Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a1a22;--card-bg:#23232e;--ink:#e8e4df;--ink-light:#b0aaa2;--ink-muted:#706b64;--accent:#c0785a;--accent-dim:rgba(192,120,90,0.25);--border:rgba(255,255,255,0.08);--note-bg:rgba(192,120,90,0.08);--input-bg:rgba(255,255,255,0.05)}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);overflow-x:hidden;-webkit-tap-highlight-color:transparent}
button{transition:opacity 0.15s;-webkit-tap-highlight-color:transparent}button:active{opacity:0.7}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--ink-muted);border-radius:4px}
select{appearance:none;cursor:pointer}details>summary{list-style:none}details>summary::-webkit-details-marker{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ── KANA DATA ──
const K=(k,r,w)=>({kana:k,romaji:r,row:w});
const HIRA={basic:[K("あ","a","vocal"),K("い","i","vocal"),K("う","u","vocal"),K("え","e","vocal"),K("お","o","vocal"),K("か","ka","k"),K("き","ki","k"),K("く","ku","k"),K("け","ke","k"),K("こ","ko","k"),K("さ","sa","s"),K("し","shi","s"),K("す","su","s"),K("せ","se","s"),K("そ","so","s"),K("た","ta","t"),K("ち","chi","t"),K("つ","tsu","t"),K("て","te","t"),K("と","to","t"),K("な","na","n"),K("に","ni","n"),K("ぬ","nu","n"),K("ね","ne","n"),K("の","no","n"),K("は","ha","h"),K("ひ","hi","h"),K("ふ","fu","h"),K("へ","he","h"),K("ほ","ho","h"),K("ま","ma","m"),K("み","mi","m"),K("む","mu","m"),K("め","me","m"),K("も","mo","m"),K("や","ya","y"),K("ゆ","yu","y"),K("よ","yo","y"),K("ら","ra","r"),K("り","ri","r"),K("る","ru","r"),K("れ","re","r"),K("ろ","ro","r"),K("わ","wa","w"),K("を","wo","w"),K("ん","n","especial")],dakuten:[K("が","ga","g"),K("ぎ","gi","g"),K("ぐ","gu","g"),K("げ","ge","g"),K("ご","go","g"),K("ざ","za","z"),K("じ","ji","z"),K("ず","zu","z"),K("ぜ","ze","z"),K("ぞ","zo","z"),K("だ","da","d"),K("ぢ","ji","d"),K("づ","zu","d"),K("で","de","d"),K("ど","do","d"),K("ば","ba","b"),K("び","bi","b"),K("ぶ","bu","b"),K("べ","be","b"),K("ぼ","bo","b"),K("ぱ","pa","p"),K("ぴ","pi","p"),K("ぷ","pu","p"),K("ぺ","pe","p"),K("ぽ","po","p")],combo:[K("きゃ","kya","ky"),K("きゅ","kyu","ky"),K("きょ","kyo","ky"),K("しゃ","sha","sh"),K("しゅ","shu","sh"),K("しょ","sho","sh"),K("ちゃ","cha","ch"),K("ちゅ","chu","ch"),K("ちょ","cho","ch"),K("にゃ","nya","ny"),K("にゅ","nyu","ny"),K("にょ","nyo","ny"),K("ひゃ","hya","hy"),K("ひゅ","hyu","hy"),K("ひょ","hyo","hy"),K("みゃ","mya","my"),K("みゅ","myu","my"),K("みょ","myo","my"),K("りゃ","rya","ry"),K("りゅ","ryu","ry"),K("りょ","ryo","ry"),K("ぎゃ","gya","gy"),K("ぎゅ","gyu","gy"),K("ぎょ","gyo","gy"),K("じゃ","ja","j"),K("じゅ","ju","j"),K("じょ","jo","j"),K("びゃ","bya","by"),K("びゅ","byu","by"),K("びょ","byo","by"),K("ぴゃ","pya","py"),K("ぴゅ","pyu","py"),K("ぴょ","pyo","py")]};
const KATA={basic:[K("ア","a","vocal"),K("イ","i","vocal"),K("ウ","u","vocal"),K("エ","e","vocal"),K("オ","o","vocal"),K("カ","ka","k"),K("キ","ki","k"),K("ク","ku","k"),K("ケ","ke","k"),K("コ","ko","k"),K("サ","sa","s"),K("シ","shi","s"),K("ス","su","s"),K("セ","se","s"),K("ソ","so","s"),K("タ","ta","t"),K("チ","chi","t"),K("ツ","tsu","t"),K("テ","te","t"),K("ト","to","t"),K("ナ","na","n"),K("ニ","ni","n"),K("ヌ","nu","n"),K("ネ","ne","n"),K("ノ","no","n"),K("ハ","ha","h"),K("ヒ","hi","h"),K("フ","fu","h"),K("ヘ","he","h"),K("ホ","ho","h"),K("マ","ma","m"),K("ミ","mi","m"),K("ム","mu","m"),K("メ","me","m"),K("モ","mo","m"),K("ヤ","ya","y"),K("ユ","yu","y"),K("ヨ","yo","y"),K("ラ","ra","r"),K("リ","ri","r"),K("ル","ru","r"),K("レ","re","r"),K("ロ","ro","r"),K("ワ","wa","w"),K("ヲ","wo","w"),K("ン","n","especial")],dakuten:[K("ガ","ga","g"),K("ギ","gi","g"),K("グ","gu","g"),K("ゲ","ge","g"),K("ゴ","go","g"),K("ザ","za","z"),K("ジ","ji","z"),K("ズ","zu","z"),K("ゼ","ze","z"),K("ゾ","zo","z"),K("ダ","da","d"),K("ヂ","ji","d"),K("ヅ","zu","d"),K("デ","de","d"),K("ド","do","d"),K("バ","ba","b"),K("ビ","bi","b"),K("ブ","bu","b"),K("ベ","be","b"),K("ボ","bo","b"),K("パ","pa","p"),K("ピ","pi","p"),K("プ","pu","p"),K("ペ","pe","p"),K("ポ","po","p")],combo:[K("キャ","kya","ky"),K("キュ","kyu","ky"),K("キョ","kyo","ky"),K("シャ","sha","sh"),K("シュ","shu","sh"),K("ショ","sho","sh"),K("チャ","cha","ch"),K("チュ","chu","ch"),K("チョ","cho","ch"),K("ニャ","nya","ny"),K("ニュ","nyu","ny"),K("ニョ","nyo","ny"),K("ヒャ","hya","hy"),K("ヒュ","hyu","hy"),K("ヒョ","hyo","hy"),K("ミャ","mya","my"),K("ミュ","myu","my"),K("ミョ","myo","my"),K("リャ","rya","ry"),K("リュ","ryu","ry"),K("リョ","ryo","ry"),K("ギャ","gya","gy"),K("ギュ","gyu","gy"),K("ギョ","gyo","gy"),K("ジャ","ja","j"),K("ジュ","ju","j"),K("ジョ","jo","j"),K("ビャ","bya","by"),K("ビュ","byu","by"),K("ビョ","byo","by"),K("ピャ","pya","py"),K("ピュ","pyu","py"),K("ピョ","pyo","py")]};

// ── UTILS ──
const DIF={beginner:{label:"Básico",color:"#4ade80",bg:"rgba(74,222,128,0.12)"},intermediate:{label:"Intermedio",color:"#fbbf24",bg:"rgba(251,191,36,0.12)"},advanced:{label:"Avanzado",color:"#f87171",bg:"rgba(248,113,113,0.12)"}};
const TC={"Verbo":"#7c9cff","Sustantivo":"#ff9cac","Adjetivo":"#a3e67c","Partícula":"#ffcf7c","Forma":"#8cd4c9","default":"#8cb4c9"};
const GCC={"Partículas":"#7c9cff","Estado de ser":"#ff9cac","Adjetivos":"#a3e67c","Verbos":"#c49cff","Estructura":"#ff9c7c","Adverbios":"#9cdfc0"};
function gtc(t){const k=Object.keys(TC).find(k=>t.toLowerCase().includes(k.toLowerCase()));return TC[k]||TC.default;}
function sh(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

// ── localStorage helpers ──
function loadData(key){try{const d=localStorage.getItem(key);return d?JSON.parse(d):null;}catch{return null;}}
function saveData(key,data){try{localStorage.setItem(key,JSON.stringify(data));}catch{}}
function downloadJSON(data,filename){const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}

// ── SHARED COMPONENTS ──
function FlipCard({front,back,flipped,onFlip,accent="var(--accent)"}){
  return(<div onClick={onFlip} style={{width:"100%",maxWidth:"420px",height:"380px",perspective:"1200px",cursor:"pointer",margin:"0 auto"}}><div style={{width:"100%",height:"100%",position:"relative",transformStyle:"preserve-3d",transition:"transform 0.5s cubic-bezier(0.4,0,0.2,1)",transform:flipped?"rotateY(180deg)":"rotateY(0deg)"}}><div style={{position:"absolute",width:"100%",height:"100%",backfaceVisibility:"hidden",background:"var(--card-bg)",borderRadius:"16px",boxShadow:"0 4px 24px rgba(0,0,0,0.12)",border:"1px solid var(--border)",overflow:"hidden"}}>{front}<div style={{position:"absolute",bottom:"14px",left:0,right:0,textAlign:"center",fontSize:"11px",color:"var(--ink-muted)",opacity:0.5}}>toca para voltear</div></div><div style={{position:"absolute",width:"100%",height:"100%",backfaceVisibility:"hidden",transform:"rotateY(180deg)",background:"var(--card-bg)",borderRadius:"16px",boxShadow:"0 4px 24px rgba(0,0,0,0.12)",border:`1px solid ${accent}44`,overflow:"hidden"}}>{back}</div></div></div>);
}
function Nav({onPrev,onNext,onFlip,color="var(--accent)"}){const B={width:"48px",height:"48px",borderRadius:"50%",border:"1px solid var(--border)",background:"var(--card-bg)",color:"var(--ink-light)",cursor:"pointer",fontSize:"20px",display:"flex",alignItems:"center",justifyContent:"center"};return(<div style={{display:"flex",justifyContent:"center",gap:"12px",marginTop:"20px"}}><button onClick={onPrev} style={B}>←</button><button onClick={onFlip} style={{padding:"12px 28px",borderRadius:"12px",border:"none",background:color,color:"#fff",cursor:"pointer",fontSize:"14px",fontWeight:600}}>Voltear</button><button onClick={onNext} style={B}>→</button></div>);}
function PBar({cur,total,color="var(--accent)",onShuffle}){return(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px",padding:"0 4px"}}><div style={{fontSize:"12px",color:"var(--ink-muted)"}}>{total>0?`${cur}/${total}`:"—"}</div><div style={{flex:1,margin:"0 12px",height:"3px",background:"var(--border)",borderRadius:"2px",overflow:"hidden"}}><div style={{height:"100%",background:color,width:total>0?`${(cur/total)*100}%`:"0%",borderRadius:"2px",transition:"width 0.3s"}}/></div><button onClick={onShuffle} style={{padding:"4px 10px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--ink-muted)",cursor:"pointer",fontSize:"11px"}}>Barajar</button></div>);}
function Pills({opts,val,onChange}){return(<div style={{display:"flex",gap:"3px",background:"rgba(255,255,255,0.04)",borderRadius:"8px",padding:"3px",flexWrap:"wrap"}}>{opts.map(o=>(<button key={o.key} onClick={()=>onChange(o.key)} style={{padding:"4px 10px",borderRadius:"6px",border:"none",background:val===o.key?(o.color||"var(--accent)"):"transparent",color:val===o.key?"#fff":"var(--ink-muted)",cursor:"pointer",fontSize:"11px",fontWeight:600,transition:"all 0.15s"}}>{o.label}</button>))}</div>);}

// ── VOCAB SECTION ──
function VocabSection({cards,setCards}){
  const[deck,setDeck]=useState([]);const[idx,setIdx]=useState(0);const[flipped,setFlipped]=useState(false);const[mode,setMode]=useState("full");const[filter,setFilter]=useState("all");const[sub,setSub]=useState("study");const[showAdd,setShowAdd]=useState(false);const[sc,setSc]=useState(0);const fileRef=useRef();
  useEffect(()=>{const f=filter==="all"?cards:cards.filter(c=>c.difficulty===filter);setDeck(sh(f));setIdx(0);setFlipped(false);setSc(0);},[cards,filter]);
  const next=()=>{setFlipped(false);setTimeout(()=>{setIdx(i=>(i+1)%deck.length);setSc(s=>s+1);},150);};
  const prev=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>(i-1+deck.length)%deck.length),150);};const c=deck[idx];
  const handleImport=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const d=JSON.parse(ev.target.result);const incoming=d.vocab||d;if(!Array.isArray(incoming)){alert("Formato inválido");return;}const eIds=new Set(cards.map(c=>c.id));const eK=new Set(cards.map(c=>c.kanji));const nc=incoming.filter(c=>!eIds.has(c.id)&&!eK.has(c.kanji));setCards(prev=>[...prev,...nc]);alert(`${nc.length} nuevas. (${incoming.length-nc.length} duplicadas omitidas)`);}catch{alert("Archivo inválido");}};reader.readAsText(file);e.target.value="";};
  return(<div style={{padding:"16px 24px",maxWidth:"560px",margin:"0 auto"}}>
    <div style={{display:"flex",gap:"6px",marginBottom:"12px",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap"}}><Pills opts={[{key:"study",label:"Estudiar"},{key:"list",label:"Lista"}]} val={sub} onChange={setSub}/><div style={{display:"flex",gap:"4px"}}><button onClick={()=>setShowAdd(true)} style={{padding:"5px 12px",borderRadius:"6px",border:"1px solid var(--accent-dim)",background:"var(--accent-dim)",color:"var(--accent)",cursor:"pointer",fontSize:"11px",fontWeight:600}}>+ Nueva</button><button onClick={()=>downloadJSON({vocab:cards},"vocab-backup.json")} style={{padding:"5px 10px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--ink-muted)",cursor:"pointer",fontSize:"11px"}}>Exportar</button><button onClick={()=>fileRef.current?.click()} style={{padding:"5px 10px",borderRadius:"6px",border:"1px solid var(--border)",background:"transparent",color:"var(--ink-muted)",cursor:"pointer",fontSize:"11px"}}>Importar</button><input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImport}/></div></div>
    {sub==="study"&&<><div style={{display:"flex",gap:"4px",marginBottom:"8px",justifyContent:"center",flexWrap:"wrap"}}><Pills opts={[{key:"full",label:"Completo"},{key:"guess",label:"Adivinar"},{key:"free",label:"Libre"}]} val={mode} onChange={v=>{setMode(v);setFlipped(false);}}/><Pills opts={[{key:"all",label:"Todos",color:"var(--ink-muted)"},{key:"beginner",label:"Básico",color:DIF.beginner.color},{key:"intermediate",label:"Inter.",color:DIF.intermediate.color},{key:"advanced",label:"Avanz.",color:DIF.advanced.color}]} val={filter} onChange={setFilter}/></div><PBar cur={idx+1} total={deck.length} onShuffle={()=>{setDeck(sh(deck));setIdx(0);setFlipped(false);}}/>{c?<><FlipCard front={<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:"12px",padding:"24px",position:"relative"}}><div style={{fontSize:"52px",fontFamily:"'Noto Serif JP',serif",fontWeight:700,letterSpacing:"4px",color:"var(--ink)"}}>{c.kanji}</div>{mode==="full"&&<><div style={{fontSize:"20px",color:"var(--ink-light)"}}>{c.hiragana}</div><div style={{fontSize:"15px",color:"var(--ink-muted)",fontStyle:"italic"}}>{c.romaji}</div></>}{mode==="guess"&&<div style={{fontSize:"13px",color:"var(--ink-muted)",opacity:0.6}}>¿Qué significa?</div>}<div style={{position:"absolute",top:16,right:16,fontSize:"11px",padding:"3px 10px",borderRadius:"20px",background:DIF[c.difficulty]?.bg,color:DIF[c.difficulty]?.color,fontWeight:600}}>{DIF[c.difficulty]?.label}</div><div style={{position:"absolute",top:16,left:16,fontSize:"11px",padding:"3px 10px",borderRadius:"20px",background:`${gtc(c.type)}22`,color:gtc(c.type),fontWeight:600}}>{c.type?.length>28?c.type.slice(0,26)+"…":c.type}</div></div>} back={<div style={{display:"flex",flexDirection:"column",height:"100%",padding:"18px 22px",overflowY:"auto",gap:"9px"}}><div style={{textAlign:"center"}}><span style={{fontSize:"26px",fontFamily:"'Noto Serif JP',serif",fontWeight:700,color:"var(--ink)"}}>{c.kanji}</span><span style={{fontSize:"14px",color:"var(--ink-light)",marginLeft:10}}>{c.hiragana}</span><span style={{fontSize:"12px",color:"var(--ink-muted)",marginLeft:6,fontStyle:"italic"}}>{c.romaji}</span></div><div style={{width:40,height:2,background:"var(--accent)",margin:"0 auto 2px",borderRadius:2}}/><div><div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",color:"var(--ink-muted)",marginBottom:2,fontWeight:600}}>Significado</div><div style={{fontSize:14,color:"var(--ink)",lineHeight:1.5}}>{c.meaning}</div></div>{c.notes&&<div style={{background:"var(--note-bg)",borderRadius:8,padding:"8px 10px",borderLeft:"3px solid var(--accent)"}}><div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",color:"var(--accent)",marginBottom:2,fontWeight:600}}>Notas</div><div style={{fontSize:12,color:"var(--ink-light)",lineHeight:1.5}}>{c.notes}</div></div>}{c.examplePhrase&&<div><div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",color:"var(--ink-muted)",marginBottom:2,fontWeight:600}}>Ejemplo</div><div style={{fontSize:14,fontFamily:"'Noto Serif JP',serif",color:"var(--ink)"}}>{c.examplePhrase}</div>{c.exampleReading&&<div style={{fontSize:11,color:"var(--ink-muted)"}}>{c.exampleReading}</div>}<div style={{fontSize:12,color:"var(--ink-light)",fontStyle:"italic",marginTop:2}}>{c.exampleTranslation}</div></div>}{c.commonality==="uncommon"&&c.commonEquivalent&&<div style={{background:"rgba(251,191,36,0.08)",borderRadius:8,padding:"8px 10px",borderLeft:"3px solid #fbbf24"}}><div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",color:"#fbbf24",marginBottom:2,fontWeight:600}}>Equivalente cotidiano</div><div style={{fontSize:12,color:"var(--ink-light)",lineHeight:1.5}}>{c.commonEquivalent}</div></div>}</div>} flipped={flipped} onFlip={()=>setFlipped(f=>!f)}/><Nav onPrev={prev} onNext={next} onFlip={()=>setFlipped(f=>!f)}/><div style={{textAlign:"center",marginTop:10,fontSize:12,color:"var(--ink-muted)"}}>Sesión: {sc} vistas</div></>:<div style={{textAlign:"center",padding:"60px 20px",color:"var(--ink-muted)"}}>📭 No hay tarjetas.</div>}</>}
    {sub==="list"&&<div style={{display:"flex",flexDirection:"column",gap:6}}><div style={{fontSize:12,color:"var(--ink-muted)",marginBottom:4}}>{cards.length} tarjetas</div>{cards.map(c=>(<div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"var(--card-bg)",borderRadius:10,border:"1px solid var(--border)"}}><div style={{fontFamily:"'Noto Serif JP',serif",fontSize:22,fontWeight:700,minWidth:55,color:"var(--ink)"}}>{c.kanji}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,color:"var(--ink-light)"}}>{c.hiragana} · {c.romaji}</div><div style={{fontSize:12,color:"var(--ink-muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.meaning}</div></div><div style={{fontSize:10,padding:"2px 8px",borderRadius:12,background:DIF[c.difficulty]?.bg,color:DIF[c.difficulty]?.color,fontWeight:600,whiteSpace:"nowrap"}}>{DIF[c.difficulty]?.label}</div><button onClick={()=>{if(confirm(`¿Eliminar "${c.kanji}"?`))setCards(p=>p.filter(x=>x.id!==c.id));}} style={{width:26,height:26,borderRadius:6,border:"1px solid var(--border)",background:"transparent",color:"var(--ink-muted)",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button></div>))}</div>}
    {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onSave={c=>{setCards(p=>[...p,c]);setShowAdd(false);}}/>}
  </div>);
}
function AddModal({onClose,onSave}){const[f,sF]=useState({kanji:"",hiragana:"",romaji:"",meaning:"",type:"Sustantivo",notes:"",examplePhrase:"",exampleReading:"",exampleTranslation:"",difficulty:"beginner",commonality:"common",commonEquivalent:""});const s=(k,v)=>sF(p=>({...p,[k]:v}));const I={width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid var(--border)",background:"var(--input-bg)",color:"var(--ink)",fontSize:14,fontFamily:"'Noto Sans JP',sans-serif",outline:"none",boxSizing:"border-box"};const L={fontSize:12,fontWeight:600,color:"var(--ink-light)",marginBottom:4,display:"block"};return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}} onClick={onClose}><div onClick={e=>e.stopPropagation()} style={{background:"var(--card-bg)",borderRadius:16,padding:24,width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}><div style={{fontSize:20,fontWeight:700,color:"var(--ink)",marginBottom:16,fontFamily:"'Noto Serif JP',serif"}}>Nueva tarjeta</div><div style={{display:"grid",gap:10}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}><div><label style={L}>Kanji</label><input style={{...I,fontFamily:"'Noto Serif JP',serif",fontSize:18,textAlign:"center"}} value={f.kanji} onChange={e=>s("kanji",e.target.value)}/></div><div><label style={L}>Hiragana</label><input style={I} value={f.hiragana} onChange={e=>s("hiragana",e.target.value)}/></div><div><label style={L}>Romaji</label><input style={I} value={f.romaji} onChange={e=>s("romaji",e.target.value)}/></div></div><div><label style={L}>Significado</label><textarea style={{...I,minHeight:55,resize:"vertical"}} value={f.meaning} onChange={e=>s("meaning",e.target.value)}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><label style={L}>Tipo</label><select style={I} value={f.type} onChange={e=>s("type",e.target.value)}>{["Sustantivo","Verbo (ichidan)","Verbo (godan)","Verbo suru","Adjetivo-i","Adjetivo-na","Adverbio","Partícula","Expresión","Otro"].map(t=><option key={t}>{t}</option>)}</select></div><div><label style={L}>Dificultad</label><select style={I} value={f.difficulty} onChange={e=>s("difficulty",e.target.value)}><option value="beginner">Básico</option><option value="intermediate">Intermedio</option><option value="advanced">Avanzado</option></select></div></div><div><label style={L}>Notas</label><textarea style={{...I,minHeight:45,resize:"vertical"}} value={f.notes} onChange={e=>s("notes",e.target.value)}/></div><div><label style={L}>Frase ejemplo</label><input style={I} value={f.examplePhrase} onChange={e=>s("examplePhrase",e.target.value)}/></div><div><label style={L}>Lectura</label><input style={I} value={f.exampleReading} onChange={e=>s("exampleReading",e.target.value)}/></div><div><label style={L}>Traducción</label><input style={I} value={f.exampleTranslation} onChange={e=>s("exampleTranslation",e.target.value)}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><label style={L}>¿Común?</label><select style={I} value={f.commonality} onChange={e=>s("commonality",e.target.value)}><option value="common">Sí</option><option value="uncommon">Poco común</option></select></div>{f.commonality==="uncommon"&&<div><label style={L}>Equivalente</label><input style={I} value={f.commonEquivalent} onChange={e=>s("commonEquivalent",e.target.value)}/></div>}</div></div><div style={{display:"flex",gap:10,marginTop:16,justifyContent:"flex-end"}}><button onClick={onClose} style={{padding:"10px 20px",borderRadius:8,border:"1px solid var(--border)",background:"transparent",color:"var(--ink-light)",cursor:"pointer",fontSize:14}}>Cancelar</button><button onClick={()=>{if(!f.kanji||!f.meaning)return;onSave({...f,id:Date.now().toString(),dateAdded:new Date().toISOString().slice(0,10)});}} style={{padding:"10px 24px",borderRadius:8,border:"none",background:"var(--accent)",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600}}>Guardar</button></div></div></div>);}

// ── KANA SECTION ──
function KanaSection(){
  const[kt,setKt]=useState("hiragana");const[grp,setGrp]=useState("basic");const[km,setKm]=useState("study");const[deck,setDeck]=useState([]);const[idx,setIdx]=useState(0);const[flipped,setFlipped]=useState(false);const[dir,setDir]=useState("kana2rom");
  const data=kt==="hiragana"?HIRA:KATA;const kC=kt==="hiragana"?"#7ca3c0":"#c07ca3";
  useEffect(()=>{const items=grp==="all"?[...data.basic,...data.dakuten,...data.combo]:data[grp]||data.basic;setDeck(sh(items));setIdx(0);setFlipped(false);},[kt,grp]);
  const next=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>(i+1)%deck.length),150);};const prev=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>(i-1+deck.length)%deck.length),150);};const cur=deck[idx];
  const GL={basic:"Básicos",dakuten:"Dakuten",combo:"Combinaciones",all:"Todos"};
  return(<div style={{padding:"16px 24px",maxWidth:"560px",margin:"0 auto"}}>
    <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:10}}><Pills opts={[{key:"hiragana",label:"ひらがな",color:"#7ca3c0"},{key:"katakana",label:"カタカナ",color:"#c07ca3"}]} val={kt} onChange={setKt}/></div>
    <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:10,flexWrap:"wrap"}}><Pills opts={[{key:"study",label:"Estudio",color:kC},{key:"table",label:"Tabla",color:kC}]} val={km} onChange={setKm}/>{km==="study"&&<Pills opts={["basic","dakuten","combo","all"].map(g=>({key:g,label:GL[g],color:kC}))} val={grp} onChange={setGrp}/>}</div>
    {km==="study"&&<><div style={{display:"flex",justifyContent:"center",marginBottom:12}}><Pills opts={[{key:"kana2rom",label:"Kana → Romaji",color:"#a3867c"},{key:"rom2kana",label:"Romaji → Kana",color:"#a3867c"}]} val={dir} onChange={v=>{setDir(v);setFlipped(false);}}/></div><PBar cur={idx+1} total={deck.length} color={kC} onShuffle={()=>{setDeck(sh(deck));setIdx(0);setFlipped(false);}}/>{cur&&<><FlipCard accent={kC} front={<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:8}}><div style={{fontSize:dir==="kana2rom"?90:40,fontFamily:"'Noto Serif JP',serif",fontWeight:700,color:"var(--ink)"}}>{dir==="kana2rom"?cur.kana:cur.romaji}</div><div style={{fontSize:13,color:"var(--ink-muted)",opacity:0.5}}>{dir==="kana2rom"?"¿Cómo se lee?":"¿Cómo se escribe?"}</div></div>} back={<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:14}}><div style={{fontSize:80,fontFamily:"'Noto Serif JP',serif",fontWeight:700,color:"var(--ink)"}}>{cur.kana}</div><div style={{width:40,height:2,background:kC,borderRadius:2}}/><div style={{fontSize:30,color:"var(--ink-light)",fontStyle:"italic",letterSpacing:2}}>{cur.romaji}</div><div style={{fontSize:12,color:"var(--ink-muted)",padding:"3px 10px",borderRadius:12,background:`${kC}1a`}}>fila: {cur.row}</div></div>} flipped={flipped} onFlip={()=>setFlipped(f=>!f)}/><Nav onPrev={prev} onNext={next} onFlip={()=>setFlipped(f=>!f)} color={kC}/></>}</>}
    {km==="table"&&<div style={{overflowX:"auto"}}>{["basic","dakuten","combo"].map(g=><div key={g} style={{marginBottom:20}}><div style={{fontSize:14,fontWeight:700,color:"var(--ink-light)",marginBottom:8,borderBottom:"1px solid var(--border)",paddingBottom:4}}>{GL[g]}</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{data[g].map((item,i)=><div key={i} style={{width:56,height:62,background:"var(--card-bg)",borderRadius:8,border:"1px solid var(--border)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}><div style={{fontSize:22,fontFamily:"'Noto Serif JP',serif",fontWeight:700,color:"var(--ink)"}}>{item.kana}</div><div style={{fontSize:9,color:"var(--ink-muted)"}}>{item.romaji}</div></div>)}</div></div>)}</div>}
  </div>);
}

// ── GRAMMAR SECTION ──
function GrammarSection({gCards,setGCards}){
  const[deck,setDeck]=useState([]);const[idx,setIdx]=useState(0);const[flipped,setFlipped]=useState(false);const[cat,setCat]=useState("all");const[dif,setDif]=useState("all");const[sub,setSub]=useState("study");const fileRef=useRef();const gC="#a3c07c";
  useEffect(()=>{let f=gCards;if(cat!=="all")f=f.filter(c=>c.category===cat);if(dif!=="all")f=f.filter(c=>c.difficulty===dif);setDeck(sh(f));setIdx(0);setFlipped(false);},[gCards,cat,dif]);
  const next=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>(i+1)%deck.length),150);};const prev=()=>{setFlipped(false);setTimeout(()=>setIdx(i=>(i-1+deck.length)%deck.length),150);};const c=deck[idx];
  const cats=[...new Set(gCards.map(c=>c.category))];
  const handleImport=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const d=JSON.parse(ev.target.result);const incoming=d.grammar||d;if(!Array.isArray(incoming)){alert("Formato inválido");return;}const eIds=new Set(gCards.map(c=>c.id));const eT=new Set(gCards.map(c=>c.title));const nc=incoming.filter(c=>!eIds.has(c.id)&&!eT.has(c.title));setGCards(prev=>[...prev,...nc]);alert(`${nc.length} nuevas. (${incoming.length-nc.length} duplicadas omitidas)`);}catch{alert("Archivo inválido");}};reader.readAsText(file);e.target.value="";};
  return(<div style={{padding:"16px 24px",maxWidth:"560px",margin:"0 auto"}}>
    <div style={{display:"flex",gap:6,marginBottom:12,justifyContent:"space-between",alignItems:"center",flexWrap:"wrap"}}><Pills opts={[{key:"study",label:"Estudiar",color:gC},{key:"list",label:"Referencia",color:gC}]} val={sub} onChange={setSub}/><div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:12,color:"var(--ink-muted)"}}>{gCards.length}</span><button onClick={()=>downloadJSON({grammar:gCards},"grammar-backup.json")} style={{padding:"5px 10px",borderRadius:6,border:"1px solid var(--border)",background:"transparent",color:"var(--ink-muted)",cursor:"pointer",fontSize:11}}>Exportar</button><button onClick={()=>fileRef.current?.click()} style={{padding:"5px 10px",borderRadius:6,border:"1px solid var(--border)",background:"transparent",color:"var(--ink-muted)",cursor:"pointer",fontSize:11}}>Importar</button><input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImport}/></div></div>
    <div style={{display:"flex",gap:4,marginBottom:8,justifyContent:"center",flexWrap:"wrap"}}><Pills opts={[{key:"all",label:"Todas",color:"var(--ink-muted)"},...cats.map(c=>({key:c,label:c,color:GCC[c]||gC}))]} val={cat} onChange={setCat}/><Pills opts={[{key:"all",label:"Todos",color:"var(--ink-muted)"},{key:"beginner",label:"Básico",color:DIF.beginner.color},{key:"intermediate",label:"Inter.",color:DIF.intermediate.color},{key:"advanced",label:"Avanz.",color:DIF.advanced.color}]} val={dif} onChange={setDif}/></div>
    {sub==="study"&&<><PBar cur={idx+1} total={deck.length} color={gC} onShuffle={()=>{setDeck(sh(deck));setIdx(0);setFlipped(false);}}/>{c?<><FlipCard accent={gC} front={<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:10,padding:24,position:"relative"}}><div style={{position:"absolute",top:16,left:16,fontSize:11,padding:"3px 10px",borderRadius:20,background:`${GCC[c.category]||gC}22`,color:GCC[c.category]||gC,fontWeight:600}}>{c.category}</div><div style={{position:"absolute",top:16,right:16,fontSize:11,padding:"3px 10px",borderRadius:20,background:DIF[c.difficulty]?.bg,color:DIF[c.difficulty]?.color,fontWeight:600}}>{DIF[c.difficulty]?.label}</div><div style={{fontSize:18,fontFamily:"'Noto Serif JP',serif",fontWeight:700,color:"var(--ink)",textAlign:"center",lineHeight:1.4}}>{c.title}</div><div style={{width:40,height:2,background:gC,borderRadius:2}}/><div style={{fontSize:14,color:"var(--ink-light)",textAlign:"center",lineHeight:1.5,padding:"0 10px"}}>{c.concept}</div></div>} back={<div style={{display:"flex",flexDirection:"column",height:"100%",padding:"16px 20px",overflowY:"auto",gap:8}}><div style={{fontSize:15,fontFamily:"'Noto Serif JP',serif",fontWeight:700,color:"var(--ink)",textAlign:"center"}}>{c.title}</div><div style={{width:40,height:2,background:gC,margin:"0 auto 2px",borderRadius:2}}/><div><div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",color:"var(--ink-muted)",marginBottom:2,fontWeight:600}}>Explicación</div><div style={{fontSize:12,color:"var(--ink-light)",lineHeight:1.5}}>{c.explanation}</div></div><div style={{background:`${gC}12`,borderRadius:8,padding:"8px 10px",borderLeft:`3px solid ${gC}`}}><div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",color:gC,marginBottom:2,fontWeight:600}}>Reglas</div><div style={{fontSize:12,color:"var(--ink)",lineHeight:1.6,whiteSpace:"pre-line",fontFamily:"'Noto Sans JP',sans-serif"}}>{c.rules}</div></div><div><div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",color:"var(--ink-muted)",marginBottom:2,fontWeight:600}}>Ejemplos</div><div style={{fontSize:12,color:"var(--ink)",lineHeight:1.6,whiteSpace:"pre-line",fontFamily:"'Noto Serif JP',serif"}}>{c.examples}</div></div>{c.tips&&<div style={{background:"rgba(251,191,36,0.08)",borderRadius:8,padding:"8px 10px",borderLeft:"3px solid #fbbf24"}}><div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",color:"#fbbf24",marginBottom:2,fontWeight:600}}>Tips</div><div style={{fontSize:12,color:"var(--ink-light)",lineHeight:1.5,whiteSpace:"pre-line"}}>{c.tips}</div></div>}</div>} flipped={flipped} onFlip={()=>setFlipped(f=>!f)}/><Nav onPrev={prev} onNext={next} onFlip={()=>setFlipped(f=>!f)} color={gC}/></>:<div style={{textAlign:"center",padding:"60px 20px",color:"var(--ink-muted)"}}>📭 No hay tarjetas.</div>}</>}
    {sub==="list"&&<div style={{display:"flex",flexDirection:"column",gap:6}}>{(cat==="all"?cats:[cat]).map(category=><div key={category}><div style={{fontSize:14,fontWeight:700,color:GCC[category]||gC,marginBottom:6,marginTop:10}}>{category}</div>{gCards.filter(c=>c.category===category&&(dif==="all"||c.difficulty===dif)).map(c=><div key={c.id} style={{padding:"12px 16px",background:"var(--card-bg)",borderRadius:10,border:"1px solid var(--border)",marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><div style={{fontSize:14,fontWeight:700,color:"var(--ink)",fontFamily:"'Noto Serif JP',serif"}}>{c.title}</div><div style={{fontSize:10,padding:"2px 8px",borderRadius:12,background:DIF[c.difficulty]?.bg,color:DIF[c.difficulty]?.color,fontWeight:600}}>{DIF[c.difficulty]?.label}</div></div><div style={{fontSize:12,color:"var(--ink-light)",lineHeight:1.4}}>{c.concept}</div><details style={{marginTop:6}}><summary style={{fontSize:11,color:gC,cursor:"pointer",fontWeight:600}}>Ver reglas y ejemplos</summary><div style={{marginTop:6,fontSize:12,color:"var(--ink-muted)",lineHeight:1.6,whiteSpace:"pre-line"}}><strong style={{color:"var(--ink-light)"}}>Reglas:</strong>{"\n"}{c.rules}{"\n\n"}<strong style={{color:"var(--ink-light)"}}>Ejemplos:</strong>{"\n"}{c.examples}{c.tips&&<>{"\n\n"}<strong style={{color:"#fbbf24"}}>Tips:</strong>{"\n"}{c.tips}</>}</div></details></div>)}</div>)}</div>}
  </div>);
}

// ── MAIN APP ──
function App(){
  const[cards,setCards]=useState([]);const[gCards,setGCards]=useState([]);const[loading,setLoading]=useState(true);const[tab,setTab]=useState("vocab");
  useEffect(()=>{const v=loadData("fc-vocab")||[];const g=loadData("fc-grammar")||[];setCards(v);setGCards(g);setLoading(false);},[]);
  useEffect(()=>{if(!loading)saveData("fc-vocab",cards);},[cards,loading]);
  useEffect(()=>{if(!loading)saveData("fc-grammar",gCards);},[gCards,loading]);
  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#1a1a22",color:"#e8e4df"}}><div style={{fontFamily:"'Noto Serif JP',serif",fontSize:18}}>読み込み中...</div></div>);
  const tabs=[{key:"vocab",kanji:"単語",label:"Vocabulario",count:cards.length,color:"var(--accent)"},{key:"kana",kanji:"仮名",label:"Kana",color:"#7ca3c0"},{key:"grammar",kanji:"文法",label:"Gramática",count:gCards.length,color:"#a3c07c"}];
  return(<div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--ink)",fontFamily:"'Noto Sans JP',sans-serif"}}>
    <div style={{padding:"16px 24px 0",textAlign:"center"}}><div style={{fontFamily:"'Noto Serif JP',serif",fontSize:22,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}><span style={{color:"var(--accent)",fontSize:26}}>札</span>日本語 Flashcards</div><div style={{fontSize:11,color:"var(--ink-muted)",marginTop:2}}>Aprende japonés, una tarjeta a la vez</div></div>
    <div style={{display:"flex",justifyContent:"center",padding:"14px 24px 0",gap:4}}>{tabs.map(t=>(<button key={t.key} onClick={()=>setTab(t.key)} style={{padding:"10px 16px",borderRadius:"10px 10px 0 0",border:`1px solid ${tab===t.key?t.color+"66":"var(--border)"}`,borderBottom:tab===t.key?`2px solid ${t.color}`:"1px solid var(--border)",background:tab===t.key?"var(--card-bg)":"transparent",color:tab===t.key?"var(--ink)":"var(--ink-muted)",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"'Noto Sans JP',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:1,minWidth:80}}><span style={{fontSize:16,fontFamily:"'Noto Serif JP',serif"}}>{t.kanji}</span><span style={{fontSize:10,display:"flex",alignItems:"center",gap:4}}>{t.label}{t.count!=null&&<span style={{background:`${t.color}33`,color:t.color,padding:"0 5px",borderRadius:8,fontSize:9}}>{t.count}</span>}</span></button>))}</div>
    <div style={{height:1,background:"var(--border)",margin:"0 24px"}}/>
    {tab==="vocab"&&<VocabSection cards={cards} setCards={setCards}/>}
    {tab==="kana"&&<KanaSection/>}
    {tab==="grammar"&&<GrammarSection gCards={gCards} setGCards={setGCards}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
